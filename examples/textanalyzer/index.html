<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Analyzer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }
header { background: linear-gradient(135deg, #1e293b, #334155); padding: 1.5rem; text-align: center; border-bottom: 1px solid #475569; }
header h1 { font-size: 1.5rem; background: linear-gradient(90deg, #a78bfa, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
header p { color: #94a3b8; font-size: 0.875rem; margin-top: 0.25rem; }
.status { text-align: center; padding: 0.5rem; font-size: 0.8rem; }
.status.connected { color: #4ade80; }
.status.disconnected { color: #f87171; }
.container { flex: 1; max-width: 900px; margin: 0 auto; padding: 1rem; width: 100%; display: flex; flex-direction: column; }
.editor-area { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
.editor-area textarea { flex: 1; min-height: 150px; padding: 1rem; border: 1px solid #475569; border-radius: 0.5rem; background: #1e293b; color: #e2e8f0; font-size: 0.9rem; resize: vertical; line-height: 1.5; }
.editor-area textarea:focus { outline: none; border-color: #a78bfa; }
.controls { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.controls button { padding: 0.6rem 1rem; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.15s; }
.btn-analyze { background: #a78bfa; color: white; }
.btn-analyze:hover { background: #8b5cf6; }
.btn-words { background: #ec4899; color: white; }
.btn-words:hover { background: #db2777; }
.btn-sentences { background: #14b8a6; color: white; }
.btn-sentences:hover { background: #0d9488; }
.results { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.5rem; margin: 0.75rem 0; }
.result-card { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.75rem; text-align: center; }
.result-card .value { font-size: 1.5rem; font-weight: 700; color: #a78bfa; }
.result-card .label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.25rem; }
.word-cloud { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.75rem; border: 1px solid #334155; border-radius: 0.5rem; background: #1e293b; min-height: 100px; }
.word-cloud .word { padding: 0.25rem 0.5rem; border-radius: 0.25rem; background: #1e293b; border: 1px solid #475569; font-size: 0.85rem; cursor: default; transition: all 0.15s; }
.word-cloud .word:hover { background: #334155; border-color: #a78bfa; }
.messages { border: 1px solid #334155; border-radius: 0.5rem; background: #0f172a; margin-top: 0.75rem; max-height: 300px; overflow-y: auto; }
.message { padding: 0.75rem; border-bottom: 1px solid #1e293b; font-size: 0.85rem; line-height: 1.5; }
.message:last-child { border-bottom: none; }
.message.system { color: #94a3b8; }
.samples { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 0.5rem 0; }
.samples button { padding: 0.3rem 0.6rem; border: 1px solid #475569; border-radius: 0.25rem; background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 0.75rem; }
.samples button:hover { background: #334155; color: #e2e8f0; }
</style>
</head>
<body>
<header>
  <h1>📊 Text Analyzer</h1>
  <p>Analyze text: word counts, reading time, word frequency, sentences</p>
</header>
<div class="status disconnected" id="status">Disconnected</div>
<div class="container">
  <div class="samples">
    <button onclick="loadSample('short')">Short</button>
    <button onclick="loadSample('medium')">Medium</button>
    <button onclick="loadSample('lorem')">Lorem Ipsum</button>
  </div>
  <div class="editor-area">
    <textarea id="textInput" placeholder="Paste your text here...">BoxLang is a modern dynamic JVM language. It combines features from many programming languages. Developers love its expressiveness and power. BoxLang can be deployed on multiple runtimes including the JVM, AWS Lambda, and WebAssembly.</textarea>
    <div class="controls">
      <button class="btn-analyze" onclick="sendAction('analyze')">📊 Analyze</button>
      <button class="btn-words" onclick="sendAction('words')">🔤 Word Frequency</button>
      <button class="btn-sentences" onclick="sendAction('sentences')">📝 Sentences</button>
    </div>
  </div>
  <div class="results" id="results"></div>
  <div id="extraContent"></div>
  <div class="messages" id="messages"></div>
</div>
<script>
const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
const ws = new WebSocket(proto + '//' + location.host + '/ws');
const messages = document.getElementById('messages');
const results = document.getElementById('results');
const extraContent = document.getElementById('extraContent');
const textInput = document.getElementById('textInput');
const status = document.getElementById('status');

ws.onopen = () => { status.textContent = 'Connected'; status.className = 'status connected'; };
ws.onclose = () => { status.textContent = 'Disconnected'; status.className = 'status disconnected'; };
ws.onmessage = (event) => { handleMessage(JSON.parse(event.data)); };

function handleMessage(data) {
  if (data.type === 'welcome') {
    addMessage('system', '📊 ' + data.service);
  } else if (data.type === 'result') {
    if (data.action === 'analyze') {
      showAnalysis(data.analysis);
    } else if (data.action === 'words') {
      showWordCloud(data.frequencies);
    } else if (data.action === 'sentences') {
      showSentences(data.sentences);
    }
  } else if (data.type === 'error') {
    addMessage('system', '⚠️ ' + data.message);
  }
}

function showAnalysis(a) {
  results.innerHTML = '';
  extraContent.innerHTML = '';
  const items = [
    { value: a.wordCount, label: 'Words' },
    { value: a.characterCount, label: 'Characters' },
    { value: a.characterCountNoSpace, label: 'Chars (no space)' },
    { value: a.sentenceCount, label: 'Sentences' },
    { value: a.paragraphCount, label: 'Paragraphs' },
    { value: a.averageWordLength, label: 'Avg Word Length' },
    { value: a.estimatedReadingTimeMinutes + 'm', label: 'Reading Time' },
  ];
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = '<div class="value">' + item.value + '</div><div class="label">' + item.label + '</div>';
    results.appendChild(card);
  });
  if (a.longestWord) {
    addMessage('system', '🔤 Longest word: <strong>' + a.longestWord + '</strong>');
  }
}

function showWordCloud(freq) {
  results.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#94a3b8;font-size:0.85rem;padding:0.5rem;">Top ' + freq.length + ' words by frequency</div>';
  extraContent.innerHTML = '';
  const cloud = document.createElement('div');
  cloud.className = 'word-cloud';
  const maxCount = freq.length > 0 ? freq[0].count : 1;
  freq.forEach(w => {
    const size = 0.7 + (w.count / maxCount) * 0.8;
    const div = document.createElement('span');
    div.className = 'word';
    div.style.fontSize = size + 'rem';
    div.textContent = w.word + ' (' + w.count + ')';
    cloud.appendChild(div);
  });
  extraContent.appendChild(cloud);
}

function showSentences(sentences) {
  results.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#94a3b8;font-size:0.85rem;padding:0.5rem;">' + sentences.length + ' sentences found</div>';
  extraContent.innerHTML = '';
  sentences.forEach(s => {
    const div = document.createElement('div');
    div.className = 'message';
    div.innerHTML = '<small style="color:#64748b">#' + s.index + '</small> ' + s.text + ' <small style="color:#64748b">(' + s.wordCount + ' words, ' + s.charCount + ' chars)</small>';
    extraContent.appendChild(div);
  });
}

function addMessage(type, html) {
  const div = document.createElement('div');
  div.className = 'message ' + type;
  div.innerHTML = html;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function sendAction(action) {
  ws.send(JSON.stringify({ action: action, text: textInput.value }));
}

const samples = {
  short: 'BoxLang is a modern dynamic JVM language. It combines features from many programming languages. Developers love its expressiveness and power.',
  medium: `BoxLang is a modern dynamic JVM language that can be deployed on multiple runtimes: operating system (Windows/Mac/Linux), web server, lambda, and web assembly. BoxLang combines many features from different programming languages, including Java, CFML, Python, Ruby, Go, and PHP, to provide developers with a modern and expressive syntax.

The language features a rich standard library with built-in functions for JSON processing, string manipulation, date/time handling, and more. BoxLang's module system allows developers to extend the language with custom functionality.

One of the key advantages of BoxLang is its seamless Java interoperability. Developers can use any Java library directly from BoxLang code, making it easy to leverage the vast Java ecosystem.`,
  lorem: `Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.

Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum. Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium.

Totam rem aperiam, eaque ipsa quae ab illo inventore veritatis et quasi architecto beatae vitae dicta sunt explicabo. Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit.`
};

function loadSample(name) { textInput.value = samples[name]; }
</script>
</body>
</html>
