name = "skybox-romannumeral"
main = "mcf-worker.js"
compatibility_date = "2025-01-01"
account_id = "84882f590c2154079d59fbaef6fb382b"

workers_dev = true

[[routes]]
pattern = "skybox-romannumeral.codetek.us"
custom_domain = true

# DO NOT add [wasm_modules] — the WASM is imported natively
# via `import wasmModule from './worker.wasm'` in mcf-worker.js

# Static assets (CSS, JS, images)
[assets]
directory = "dist/assets"

[[durable_objects.bindings]]
name = "WEBSOCKET_DO"
class_name = "MatchBoxWebSocketDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MatchBoxWebSocketDO"]
