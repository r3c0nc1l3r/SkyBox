name = "matchbox-echo"
main = "mcf-worker.js"
compatibility_date = "2025-01-01"

# Rules for importing WASM modules as CompiledWasm
rules = [
    { type = "CompiledWasm", globs = ["**/*.wasm"] }
]

[[durable_objects.bindings]]
name = "WEBSOCKET_DO"
class_name = "MatchBoxWebSocketDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MatchBoxWebSocketDO"]
