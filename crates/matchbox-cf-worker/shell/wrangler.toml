# ═══════════════════════════════════════════════════════════════════════
# wrangler.toml — Cloudflare Workers configuration
#
# Auto-generated for a SkyBox / MatchBox WebSocket app.
# Modify binding names as needed for your project.
# ═══════════════════════════════════════════════════════════════════════

name = "my-boxlang-ws-app"
main = "mcf-worker.js"
compatibility_date = "2025-01-01"

# WASM module containing the compiled BoxLang VM + bytecode
[wasm_modules]
worker = "dist/worker.wasm"

# Durable Object binding for the WebSocket host
[[durable_objects.bindings]]
name = "WEBSOCKET_DO"
class_name = "MatchBoxWebSocketDO"

# Durable Object migration (required for first deploy)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["MatchBoxWebSocketDO"]

# ── Optional bindings (uncomment and configure as needed) ──

# KV Namespace
# [[kv_namespaces]]
# binding = "KV_MYSTORE"
# id = "..."

# R2 Bucket
# [[r2_buckets]]
# binding = "R2_ASSETS"
# bucket_name = "my-assets"

# D1 Database
# [[d1_databases]]
# binding = "D1_DB"
# database_name = "my-db"
# database_id = "..."

# Queue
# [[queues]]
# binding = "QUEUE_MYQUEUE"
# queue_name = "my-queue"
