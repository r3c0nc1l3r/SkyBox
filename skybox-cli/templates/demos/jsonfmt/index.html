<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter & Validator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Courier New', monospace; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }
header { background: linear-gradient(135deg, #1e293b, #334155); padding: 1.5rem; text-align: center; border-bottom: 1px solid #475569; }
header h1 { font-size: 1.5rem; background: linear-gradient(90deg, #22d3ee, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
header p { color: #94a3b8; font-size: 0.875rem; margin-top: 0.25rem; }
.status { text-align: center; padding: 0.5rem; font-size: 0.8rem; }
.status.connected { color: #4ade80; }
.status.disconnected { color: #f87171; }
.container { flex: 1; max-width: 900px; margin: 0 auto; padding: 1rem; width: 100%; display: flex; flex-direction: column; }
.editor-area { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
.editor-area textarea { flex: 1; min-height: 200px; padding: 1rem; border: 1px solid #475569; border-radius: 0.5rem; background: #1e293b; color: #e2e8f0; font-family: 'Courier New', monospace; font-size: 0.85rem; resize: vertical; tab-size: 2; }
.editor-area textarea:focus { outline: none; border-color: #22d3ee; }
.controls { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.controls button { padding: 0.6rem 1rem; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.15s; }
.btn-format { background: #22d3ee; color: #0f172a; }
.btn-format:hover { background: #06b6d4; }
.btn-validate { background: #10b981; color: white; }
.btn-validate:hover { background: #059669; }
.btn-minify { background: #f59e0b; color: #0f172a; }
.btn-minify:hover { background: #d97706; }
.btn-count { background: #8b5cf6; color: white; }
.btn-count:hover { background: #7c3aed; }
.output-area { flex: 1; min-height: 200px; padding: 1rem; border: 1px solid #334155; border-radius: 0.5rem; background: #0f172a; overflow-y: auto; font-size: 0.85rem; white-space: pre-wrap; }
.output-area .error { color: #f87171; }
.output-area .success { color: #4ade80; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 0.5rem; margin: 0.5rem 0; }
.stat { background: #1e293b; border: 1px solid #334155; border-radius: 0.375rem; padding: 0.5rem; text-align: center; }
.stat .value { font-size: 1.25rem; font-weight: 700; color: #22d3ee; }
.stat .label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; }
.samples { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 0.5rem 0; }
.samples button { padding: 0.3rem 0.6rem; border: 1px solid #475569; border-radius: 0.25rem; background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 0.75rem; }
.samples button:hover { background: #334155; color: #e2e8f0; }
</style>
</head>
<body>
<header>
  <h1>{ } JSON Formatter & Validator</h1>
  <p>Format, validate, minify, and analyze JSON</p>
</header>
<div class="status disconnected" id="status">Disconnected</div>
<div class="container">
  <div class="samples">
    <button onclick="loadSample('simple')">Simple Object</button>
    <button onclick="loadSample('nested')">Nested</button>
    <button onclick="loadSample('array')">Array</button>
    <button onclick="loadSample('invalid')">Invalid</button>
  </div>
  <div class="editor-area">
    <textarea id="jsonInput" placeholder='Paste JSON here...'>{"name":"BoxLang","version":"1.0.0","features":["dynamic","modular","productive"],"website":"https://boxlang.io"}</textarea>
    <div class="controls">
      <button class="btn-format" onclick="sendAction('format')">🎨 Format</button>
      <button class="btn-validate" onclick="sendAction('validate')">✓ Validate</button>
      <button class="btn-minify" onclick="sendAction('minify')">🗜️ Minify</button>
      <button class="btn-count" onclick="sendAction('count')">📊 Analyze</button>
    </div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="output-area" id="output">Results will appear here...</div>
</div>
<script>
const ws = new WebSocket('ws://' + location.host + '/ws');
const output = document.getElementById('output');
const jsonInput = document.getElementById('jsonInput');
const stats = document.getElementById('stats');
const status = document.getElementById('status');

ws.onopen = () => { status.textContent = 'Connected'; status.className = 'status connected'; };
ws.onclose = () => { status.textContent = 'Disconnected'; status.className = 'status disconnected'; };
ws.onmessage = (event) => { handleMessage(JSON.parse(event.data)); };

function handleMessage(data) {
  if (data.type === 'welcome') {
    output.innerHTML = '<span class="success">✓</span> Connected to ' + data.service;
  } else if (data.type === 'result') {
    if (data.action === 'format') {
      output.innerHTML = syntaxHighlight(data.output);
    } else if (data.action === 'validate') {
      stats.innerHTML = '';
      if (data.valid) {
        output.innerHTML = '<span class="success">✓ Valid JSON</span> (' + data.jsonType + ')';
      } else {
        output.innerHTML = '<span class="error">✗ Invalid: ' + data.error + '</span>';
      }
    } else if (data.action === 'minify') {
      output.innerHTML = syntaxHighlight(data.output);
      stats.innerHTML = '<div class="stat"><div class="value">' + data.inputLength + '</div><div class="label">Input Bytes</div></div>' +
        '<div class="stat"><div class="value">' + data.outputLength + '</div><div class="label">Output Bytes</div></div>' +
        '<div class="stat"><div class="value">' + (data.inputLength - data.outputLength) + '</div><div class="label">Saved</div></div>';
    } else if (data.action === 'count') {
      const c = data.counts;
      stats.innerHTML = Object.entries(c).map(([k, v]) =>
        '<div class="stat"><div class="value">' + v + '</div><div class="label">' + k.replace(/([A-Z])/g, ' $1').trim() + '</div></div>'
      ).join('');
      output.innerHTML = '<span class="success">✓</span> Analysis complete';
    }
  } else if (data.type === 'error') {
    output.innerHTML = '<span class="error">⚠️ ' + data.message + '</span>';
  }
}

function syntaxHighlight(json) {
  if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
  json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  return json.replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    function (match) {
      let cls = 'number';
      if (/^"/.test(match)) {
        if (/:$/.test(match)) {
          cls = 'key';
          match = match.replace(/"/g, '');
          match = match.replace(/:$/, '');
          match = '<span style="color:#22d3ee">"' + match + '"</span>:';
          return match;
        } else {
          cls = 'string';
        }
      } else if (/true|false/.test(match)) {
        cls = 'boolean';
      } else if (/null/.test(match)) {
        cls = 'null';
      }
      const colors = { string: '#4ade80', number: '#fbbf24', boolean: '#60a5fa', 'null': '#f87171', key: '#22d3ee' };
      return '<span style="color:' + (colors[cls] || '#e2e8f0') + '">' + match + '</span>';
    }
  );
}

function sendAction(action) {
  ws.send(JSON.stringify({ action: action, json: jsonInput.value }));
}

const samples = {
  simple: '{"name":"BoxLang","version":"1.0.0","features":["dynamic","modular","productive"],"website":"https://boxlang.io"}',
  nested: '{"user":{"name":"John Doe","age":30,"address":{"street":"123 Main St","city":"Springfield","zip":"12345"},"roles":["admin","user"]},"meta":{"created":"2025-01-15","active":true,"score":98.5,"tags":null}}',
  array: '[{"id":1,"name":"Alice","score":95},{"id":2,"name":"Bob","score":87},{"id":3,"name":"Charlie","score":92}]',
  invalid: '{"name": "Broken JSON", "missing": }'
};

function loadSample(name) {
  jsonInput.value = samples[name];
  if (name === 'invalid') {
    ws.send(JSON.stringify({ action: 'validate', json: jsonInput.value }));
  }
}
</script>
</body>
</html>
