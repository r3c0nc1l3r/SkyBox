<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roman Numeral Converter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }
header { background: linear-gradient(135deg, #1e293b, #334155); padding: 1.5rem; text-align: center; border-bottom: 1px solid #475569; }
header h1 { font-size: 1.5rem; background: linear-gradient(90deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
header p { color: #94a3b8; font-size: 0.875rem; margin-top: 0.25rem; }
.status { text-align: center; padding: 0.5rem; font-size: 0.8rem; }
.status.connected { color: #4ade80; }
.status.disconnected { color: #f87171; }
.container { flex: 1; max-width: 800px; margin: 0 auto; padding: 1rem; width: 100%; display: flex; flex-direction: column; }
.converter { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; padding: 1rem 0; }
.converter-card { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 1rem; }
.converter-card h3 { color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
.converter-card input { width: 100%; padding: 0.75rem; border: 1px solid #475569; border-radius: 0.5rem; background: #0f172a; color: #e2e8f0; font-size: 1.25rem; margin-bottom: 0.5rem; }
.converter-card input:focus { outline: none; border-color: #f59e0b; }
.converter-card .result { font-size: 1.5rem; font-weight: 700; text-align: center; padding: 0.75rem; color: #fbbf24; }
.converter-card button { width: 100%; padding: 0.5rem; border: none; border-radius: 0.25rem; cursor: pointer; font-weight: 500; }
.btn-roman { background: #f59e0b; color: #0f172a; }
.btn-roman:hover { background: #d97706; }
.btn-int { background: #3b82f6; color: white; }
.btn-int:hover { background: #2563eb; }
.messages { flex: 1; overflow-y: auto; padding: 0.5rem; border: 1px solid #334155; border-radius: 0.5rem; background: #0f172a; min-height: 200px; }
.message { padding: 0.75rem; margin: 0.5rem 0; border-radius: 0.5rem; }
.message.system { background: #1e293b; border-left: 3px solid #f59e0b; }
.message.result { background: #1e293b; border-left: 3px solid #4ade80; }
.message.error { background: #1e293b; border-left: 3px solid #f87171; }
.message pre { background: #0f172a; padding: 0.5rem; border-radius: 0.25rem; overflow-x: auto; font-size: 0.8rem; margin-top: 0.5rem; }
.quick-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 0.5rem 0; }
.quick-btns button { padding: 0.4rem 0.8rem; border: 1px solid #475569; border-radius: 0.25rem; background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 0.8rem; }
.quick-btns button:hover { background: #334155; color: #e2e8f0; }
</style>
</head>
<body>
<header>
  <h1>VII → Roman Numeral Converter</h1>
  <p>Convert between Roman numerals and integers</p>
</header>
<div class="status disconnected" id="status">Disconnected</div>
<div class="container">
  <div class="quick-btns">
    <button onclick="toRoman(2025)">2025 → MMXXV</button>
    <button onclick="toRoman(49)">49 → XLIX</button>
    <button onclick="toInt('MCMXCVIII')">MCMXCVIII → 1998</button>
    <button onclick="toInt('CDXLIV')">CDXLIV → 444</button>
    <button onclick="sortDemo()">Sort [III, IX, V, II]</button>
    <button onclick="sendAction('help')">❓ Help</button>
  </div>
  <div class="converter">
    <div class="converter-card">
      <h3>Integer → Roman</h3>
      <input type="number" id="intInput" min="1" max="3999" value="2025" />
      <button class="btn-roman" onclick="toRoman(parseInt(document.getElementById('intInput').value))">Convert</button>
      <div class="result" id="romanResult">—</div>
    </div>
    <div class="converter-card">
      <h3>Roman → Integer</h3>
      <input type="text" id="romanInput" value="MMXXV" />
      <button class="btn-int" onclick="toInt(document.getElementById('romanInput').value.toUpperCase())">Convert</button>
      <div class="result" id="intResult">—</div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
</div>
<script>
const ws = new WebSocket('ws://' + location.host + '/ws');
const messages = document.getElementById('messages');
const status = document.getElementById('status');

ws.onopen = () => { status.textContent = 'Connected'; status.className = 'status connected'; };
ws.onclose = () => { status.textContent = 'Disconnected'; status.className = 'status disconnected'; };
ws.onmessage = (event) => { handleMessage(JSON.parse(event.data)); };

function handleMessage(data) {
  if (data.type === 'welcome') {
    addMessage('system', '🏛️ ' + data.service);
  } else if (data.type === 'result') {
    addMessage('result', createResultHTML(data));
    if (data.action === 'toRoman') document.getElementById('romanResult').textContent = data.output;
    if (data.action === 'toInt') document.getElementById('intResult').textContent = data.output;
  } else if (data.type === 'error') {
    addMessage('error', '⚠️ ' + data.message);
  } else if (data.type === 'help') {
    let html = '📖 <strong>Commands:</strong><br>';
    data.commands.forEach(c => html += '• <code>' + JSON.stringify(c) + '</code><br>');
    addMessage('system', html);
  }
}

function createResultHTML(d) {
  if (d.action === 'toRoman') return '🔢 ' + d.input + ' → <strong>' + d.output + '</strong>';
  if (d.action === 'toInt') return '📝 ' + d.input + ' → <strong>' + d.output + '</strong>';
  if (d.action === 'sort') return '📊 ' + JSON.stringify(d.input) + ' → <strong>' + JSON.stringify(d.output) + '</strong>';
  return '<pre>' + JSON.stringify(d, null, 2) + '</pre>';
}

function addMessage(type, html) {
  const div = document.createElement('div');
  div.className = 'message ' + type;
  div.innerHTML = html;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function sendAction(action, extra) {
  const msg = Object.assign({ action: action }, extra || {});
  ws.send(JSON.stringify(msg));
}

function toRoman(num) { sendAction('toRoman', { value: num }); }
function toInt(roman) { sendAction('toInt', { value: roman }); }
function sortDemo() { sendAction('sort', { values: ['III', 'IX', 'V', 'II', 'VIII', 'IV', 'X', 'VI'] }); }
</script>
</body>
</html>
