# ═══════════════════════════════════════════════════════════════════════
# wrangler.toml - Cloudflare Workers configuration
#
# Auto-generated by `box skybox init`.
# ═══════════════════════════════════════════════════════════════════════

name = "{{appName}}"
main = "mcf-worker.js"
compatibility_date = "2025-01-01"

# NOTE: [wasm_modules] is NOT used. The WASM is imported natively
# in mcf-worker.js via: import wasmModule from './worker.wasm'
# Create a symlink: ln -sf dist/worker.wasm worker.wasm

# Durable Object binding for the WebSocket host
[[durable_objects.bindings]]
name = "WEBSOCKET_DO"
class_name = "MatchBoxWebSocketDO"

# Durable Object migration (required for first deploy)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["MatchBoxWebSocketDO"]
